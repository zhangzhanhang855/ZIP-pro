name: Compress Folder to Password-Protected ZIP

on:
  workflow_dispatch: # 允许在 Actions 页面手动触发

jobs:
  zip-files:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安装 zip 工具
      - name: Install zip utility
        run: sudo apt-get update && sudo apt-get install -y zip

      # 3. 将目标文件夹压缩为带密码的 ZIP
      - name: Create password-protected ZIP
        run: |
          # 注意顺序：先写生成的压缩包名(archive.zip)，再写要压缩的文件夹(files/)
          zip -r -P "如果你真的想要看的话，请叫爸爸" Mods.zip files/

      # 4. 将生成的 ZIP 文件上传为产物，供下载
      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-archive
          # 这里直接写 archive.zip，不要加 result/ 前缀，因为它就生成在根目录
          path: Mods.zip
          retention-days: 7 # 产物保留天数
